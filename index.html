<style>

  </div>
  <div class="loader-sub" id="loader-sub"></div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="lbar"></div></div>
</div>

<!-- NAV -->
<nav id="nav" >
  <a href="#hero" class="nav-logo" id="nav-logo"></a>
  <div class="nav-right">
    <div class="nav-links">
      <a href="#work">Work</a>
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#contact">Contact</a>
    </div>
    <div class="avail-badge" id="avail-badge"></div>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-eyebrow" id="hero-eyebrow"></div>
  <h1 class="hero-headline" id="hero-headline"></h1>
  <p class="hero-sub" id="hero-sub"></p>
  <div class="hero-actions">
    <a href="#work" class="btn btn-fill">Selected Work →</a>
    <a class="btn btn-out" id="hero-email" href="#">Get in touch</a>
  </div>
  <div class="hero-scroll-hint">
    <div class="scroll-tick"></div>
    <span>Scroll</span>
  </div>
</section>

<!-- PROOF STRIP -->
<div id="proof"></div>

<!-- WORK -->
<section id="work">
  <div class="section-header">
    <span class="section-label">Selected Work</span>
    <span class="section-count" id="work-count"></span>
  </div>
  <div id="projects-list"></div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="about-left reveal">
    <div class="about-label">About</div>
    <div class="about-body" id="about-body"></div>
  </div>
  <div class="about-right reveal">
    <div class="about-label">Experience</div>
    <ul class="timeline" id="timeline"></ul>
  </div>
</section>

<!-- SKILLS -->
<section id="skills">
  <div class="about-label" style="margin-bottom:0">Skills & Tools</div>
  <div class="skills-grid" id="skills-grid"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="contact-top reveal">
    <div class="contact-headline" id="contact-hl"></div>
    <div class="contact-right">
      <p class="contact-pitch">Not a demo. Not a side project. <strong>Something that runs, scales, and works when it needs to.</strong> If that's what you're building, let's talk.</p>
      <div class="contact-links" id="contact-links"></div>
      <div class="contact-slots" id="contact-slots"></div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <span id="footer-l"></span>
  <span id="footer-r"></span>
</footer>

<script>
/* ── CURSOR ───────────────────── */
const cur = document.getElementById('cur');
let tx = 0, ty = 0, cx = 0, cy = 0;
document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
(function tick() {
  cx += (tx - cx) * .14;
  cy += (ty - cy) * .14;
  cur.style.left = cx + 'px';
  cur.style.top = cy + 'px';
  requestAnimationFrame(tick);
})();
function addCursorEffect(els, cls) {
  els.forEach(el => {
    el.addEventListener('mouseenter', () => cur.classList.add(cls));
    el.addEventListener('mouseleave', () => cur.classList.remove(cls));
  });
}

/* ── LOADER ───────────────────── */
function runLoader(cb) {
  const names = ME.name.split(' ');
  document.getElementById('ln1').textContent = names[0];
  document.getElementById('ln2').textContent = names[1];
  document.getElementById('loader-sub').textContent = ME.role + ' · ' + ME.location;
  const bar = document.getElementById('lbar');

  setTimeout(() => {
    document.getElementById('ln1').classList.add('in');
    document.getElementById('loader-sub').classList.add('in');
  }, 100);
  setTimeout(() => document.getElementById('ln2').classList.add('in'), 220);
  setTimeout(() => { bar.style.width = '100%'; }, 300);
  setTimeout(() => {
    document.getElementById('loader').classList.add('out');
    setTimeout(cb, 700);
  }, 2600);
}

/* ── COUNT UP ─────────────────── */
function countUp(el, target, suffix, duration) {
  const start = Date.now();
  const isDecimal = target % 1 !== 0;
  function update() {
    const p = Math.min((Date.now() - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val = isDecimal ? (target * ease).toFixed(1) : Math.round(target * ease);
    el.querySelector('.num').textContent = val;
    if (p < 1) requestAnimationFrame(update);
  }
  update();
}

/* ── BUILD DOM ────────────────── */
function build() {
  const P = ME;

  // NAV
  document.getElementById('nav-logo').textContent = P.name.split(' ')[0] + '.';
  const ab = document.getElementById('avail-badge');
  ab.innerHTML = `<div class="avail-dot"></div>${P.available ? 'Available for work' : 'Not available'}`;

  // HERO
  document.getElementById('hero-eyebrow').textContent = P.role + ' — ' + P.location;
  const hl = document.getElementById('hero-headline');
  hl.innerHTML = P.headline.replace('Lagos bank', '<em>Lagos bank</em>');
  document.getElementById('hero-sub').textContent = P.subheadline;
  document.getElementById('hero-email').href = 'mailto:' + P.email;

  // PROOF
  const proof = document.getElementById('proof');
  P.stats.forEach(s => {
    proof.innerHTML += `<div class="proof-cell reveal">
      <div class="proof-num"><span class="num">0</span><span class="suf">${s.suffix}</span></div>
      <div class="proof-label">${s.label}</div>
    </div>`;
  });

  // PROJECTS
  const pl = document.getElementById('projects-list');
  document.getElementById('work-count').textContent = P.projects.length + ' projects';
  P.projects.forEach(p => {
    const liveBtn = p.live
      ? `<a class="p-link" href="${p.live}" target="_blank">↗ View Live</a>`
      : `<span class="p-link dim">↗ View Live</span>`;
    pl.innerHTML += `
    <div class="project reveal">
      <div class="project-num">${p.num}</div>
      <div class="project-left">
        <h2 class="project-name">${p.name}</h2>
        <div class="project-story">
          <div class="story-row">
            <span class="story-tag problem">Problem</span>
            <span class="story-text">${p.problem}</span>
          </div>
          <div class="story-row">
            <span class="story-tag">Solution</span>
            <span class="story-text">${p.solution}</span>
          </div>
          <div class="story-row">
            <span class="story-tag result">Result</span>
            <span class="story-text"><strong>${p.result}</strong></span>
          </div>
        </div>
      </div>
      <div class="project-right">
        <div>
          <div class="p-status s-${p.status}"><span class="dot"></span>${{live:'Live',complete:'Complete',building:'In Progress'}[p.status]}</div>
          <div class="project-tech">${p.tech.map(t=>`<span class="t-chip">${t}</span>`).join('')}</div>
        </div>
        ${liveBtn}
      </div>
    </div>`;
  });

  // ABOUT
  const ab2 = document.getElementById('about-body');
  P.about.forEach((para, i) => {
    const tag = i === 0 ? 'p' : 'p';
    ab2.innerHTML += `<${tag}>${para}</${tag}>`;
  });

  // TIMELINE
  const tl = document.getElementById('timeline');
  P.experience.forEach(e => {
    tl.innerHTML += `<li class="tl-item">
      <div class="tl-period">${e.period}</div>
      <div class="tl-body">
        <div class="tl-role">${e.role}</div>
        <div class="tl-company">${e.company} · ${e.location}</div>
        <div class="tl-highlight">${e.highlight}</div>
      </div>
    </li>`;
  });

  // SKILLS
  const sg = document.getElementById('skills-grid');
  Object.entries(P.skills).forEach(([group, items]) => {
    sg.innerHTML += `<div class="skill-group reveal">
      <div class="skill-group-label">${group}</div>
      ${items.map(s => `<div class="skill-item">${s}</div>`).join('')}
    </div>`;
  });

  // CONTACT
  document.getElementById('contact-hl').innerHTML = `Let's build<br>something<br><em>real.</em>`;
  const cl = document.getElementById('contact-links');
  [
    { label:'Email', value: P.email, href:`mailto:${P.email}` },
    { label:'GitHub', value: P.github.replace('https://',''), href: P.github },
    { label:'WhatsApp', value: P.whatsapp, href:`https://wa.me/${P.whatsapp.replace(/\D/g,'')}` }
  ].forEach(c => {
    cl.innerHTML += `<a class="c-link" href="${c.href}" target="_blank">
      <div class="c-link-text">
        <span class="c-link-label">${c.label}</span>
        <span class="c-link-value">${c.value}</span>
      </div>
      <span class="c-link-arrow">↗</span>
    </a>`;
  });
  document.getElementById('contact-slots').innerHTML = `<div class="avail-dot"></div> Currently available — ${P.availableSlots} remote slots open`;

  // FOOTER
  document.getElementById('footer-l').textContent = P.name + ' · ' + new Date().getFullYear();
  document.getElementById('footer-r').textContent = 'Lagos, Nigeria';

  // cursor effects
  setTimeout(() => {
    addCursorEffect(document.querySelectorAll('a, button'), 'big');
    addCursorEffect(document.querySelectorAll('p, .story-text, .about-body'), 'text-mode');
  }, 100);
}

/* ── REVEAL ON SCROLL ─────────── */
function initReveal() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        // count up for proof cells
        if (e.target.classList.contains('proof-cell')) {
          const idx = [...e.target.parentElement.children].indexOf(e.target);
          const stat = ME.stats[idx];
          countUp(e.target, stat.value, stat.suffix, 1200);
        }
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

/* ── INIT ─────────────────────── */
build();
runLoader(() => {
  document.getElementById('nav').classList.add('show');
  initReveal();
});
</script>
</body>
</html>
